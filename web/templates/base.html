<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trading Bot{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-graph-up-arrow fs-3"></i>
            <span class="sidebar-title">TradingBot</span>
        </div>

        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'positions_page' %}active{% endif %}" href="/positions">
                    <i class="bi bi-briefcase"></i>
                    <span>Positions</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'performance_page' %}active{% endif %}" href="/performance">
                    <i class="bi bi-bar-chart-line"></i>
                    <span>Performance</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'crypto_page' %}active{% endif %}" href="/crypto">
                    <i class="bi bi-currency-bitcoin"></i>
                    <span>Crypto</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'stocks_page' %}active{% endif %}" href="/stocks">
                    <i class="bi bi-bank"></i>
                    <span>Stocks</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'signals_page' %}active{% endif %}" href="/signals">
                    <i class="bi bi-lightning"></i>
                    <span>Signals</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'history_page' %}active{% endif %}" href="/history">
                    <i class="bi bi-clock-history"></i>
                    <span>History</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}" href="/settings">
                    <i class="bi bi-gear"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="bot-status" id="botStatus">
                <span class="status-indicator status-idle"></span>
                <span class="status-text">Idle</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="d-flex align-items-center">
                <h4 class="mb-0">{% block page_title %}Dashboard{% endblock %}</h4>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="badge bg-warning text-dark" id="tradingMode">
                    <i class="bi bi-file-earmark-text"></i> Paper Trading
                </span>
                <button class="btn btn-primary btn-sm" id="runCycleBtn" onclick="runCycle()">
                    <i class="bi bi-play-fill"></i> Run Cycle
                </button>
                <span class="text-muted small" id="lastUpdate">--</span>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <i class="bi bi-info-circle me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
